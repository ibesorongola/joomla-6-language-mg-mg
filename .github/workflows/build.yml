name: Build mg-MG Language Pack

on:
  schedule:
    - cron: '0 2 * * 0'   # Tous les dimanches à 2h du matin
  workflow_dispatch:       # Permet un déclenchement manuel

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: zip, simplexml

      - name: Run build script
        run: php build.php
        id: build

      - name: Check if new version was generated
        id: check
        run: |
          if [ -f version.txt ]; then
            NEW_VERSION=$(cat version.txt)
            if ls pkg_mg-MG_v${NEW_VERSION}.zip 1> /dev/null 2>&1; then
              echo "new_version=true" >> $GITHUB_OUTPUT
              echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            else
              echo "new_version=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "new_version=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated XML files and version.txt
        if: steps.check.outputs.new_version == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add translationlist_mg-MG.xml details_mg-MG_pkg.xml version.txt
          git commit -m "Auto-update to version ${{ steps.check.outputs.version }}"
          git push

      - name: Create Release
        if: steps.check.outputs.new_version == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: Release v${{ steps.check.outputs.version }}
          files: pkg_mg-MG_v${{ steps.check.outputs.version }}.zip
          body: |
            Automatic update based on fr-FR version ${{ steps.check.outputs.version }}
            This release was automatically generated by a GitHub Action.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
